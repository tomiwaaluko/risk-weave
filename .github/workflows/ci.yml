name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.20"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  frontend:
    name: Frontend lint, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  containers:
    name: Compose and container builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker compose --env-file .env.example config --quiet
      - run: docker compose --env-file .env.example build backend frontend

  e2e:
    name: Compose stack end-to-end round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Boot only the backend and its data dependencies (postgres/neo4j/redis);
      # the frontend is not needed for the API round-trip. The placeholder
      # .env.example key is fine — this path is deterministic and never calls
      # Gemini (RIS-36). No secrets are used, so per-PR CI stays free and fast.
      - name: Boot the backend stack
        run: >-
          docker compose --env-file .env.example up
          --build --wait --wait-timeout 240 backend
      - name: Deterministic seed -> run -> hash round-trip
        run: python3 scripts/e2e_roundtrip.py http://localhost:8000
      - name: Dump backend logs on failure
        if: failure()
        run: docker compose --env-file .env.example logs backend
      - name: Tear down
        if: always()
        run: docker compose --env-file .env.example down -v
